<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="toolbar-title">Profile</div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-wrapper">

    <!-- Profile Hero -->
    <div class="profile-hero">
      <div class="avatar-wrap">
        <!-- 📸 PROFILE PHOTO: replace the initials div with <img src="assets/img/avatar.png"> -->
        <div class="avatar">JD</div>
        <div class="avatar-edit">✏️</div>
      </div>
      <h2 class="p-name">Precious Nita Lipon</h2>
      <p class="p-email">nita@email.com</p>
      <div class="stats-row">
        <div class="stat"><span class="s-val">{{ shop.cart().length }}</span><span class="s-lbl">In Cart</span></div>
        <div class="stat-div"></div>
        <div class="stat"><span class="s-val">{{ shop.wishlistCount() }}</span><span class="s-lbl">Wishlist</span></div>
        <div class="stat-div"></div>
        <div class="stat"><span class="s-val">0</span><span class="s-lbl">Orders</span></div>
      </div>
    </div>

    <!-- Menu -->
    <div class="menu-list">
      @for (item of menuItems; track item.label) {
        <div class="menu-item">
          <div class="menu-icon-wrap">
            <ion-icon [name]="item.icon"></ion-icon>
          </div>
          <div class="menu-text">
            <span class="m-label">{{ item.label }}</span>
            <span class="m-sub">{{ item.sub }}</span>
          </div>
          <ion-icon name="chevron-forward-outline" class="m-arrow"></ion-icon>
        </div>
      }
    </div>

    <button class="logout-btn">
      <ion-icon name="log-out-outline"></ion-icon>
      Log Out
    </button>

  </div>
</ion-content>
