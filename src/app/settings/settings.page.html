<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="router.navigate(['/profile'])">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <div class="toolbar-title">Settings ⚙️</div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-wrapper">

    <div class="settings-section">
      <p class="section-label">Notifications</p>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Order Updates</span>
          <span class="s-sub">Get notified on order status</span>
        </div>
        <ion-toggle [(ngModel)]="orderUpdates" class="pink-toggle"></ion-toggle>
      </div>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Promotions & Sales</span>
          <span class="s-sub">New arrivals and discounts</span>
        </div>
        <ion-toggle [(ngModel)]="promoAlerts" class="pink-toggle"></ion-toggle>
      </div>
    </div>

    <div class="settings-section">
      <p class="section-label">About</p>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="shield-checkmark-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Privacy Policy</span>
          <span class="s-sub">How we handle your data</span>
        </div>
      </div>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="information-circle-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">App Version</span>
          <span class="s-sub">v1.0.0</span>
        </div>
      </div>
    </div>

  </div>
</ion-content>
