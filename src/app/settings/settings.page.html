<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button (click)="router.navigate(['/profile'])">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <div class="toolbar-title">Settings ⚙️</div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="page-wrapper">

    <div class="settings-section">
      <p class="section-label">Notifications</p>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Push Notifications</span>
          <span class="s-sub">Receive app alerts</span>
        </div>
        <ion-toggle [(ngModel)]="notifications" class="pink-toggle"></ion-toggle>
      </div>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Order Updates</span>
          <span class="s-sub">Shipping & delivery alerts</span>
        </div>
        <ion-toggle [(ngModel)]="orderUpdates" class="pink-toggle"></ion-toggle>
      </div>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="notifications-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Promo Emails</span>
          <span class="s-sub">Sales and new arrivals</span>
        </div>
        <ion-toggle [(ngModel)]="promoEmails" class="pink-toggle"></ion-toggle>
      </div>
    </div>

    <div class="settings-section">
      <p class="section-label">Appearance</p>

      <div class="setting-row">
        <div class="setting-icon-wrap">
          <ion-icon name="moon-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Dark Mode</span>
          <span class="s-sub">Coming soon</span>
        </div>
        <ion-toggle [(ngModel)]="darkMode" [disabled]="true" class="pink-toggle"></ion-toggle>
      </div>
    </div>

    <div class="settings-section">
      <p class="section-label">Account</p>

      <div class="setting-row arrow-row">
        <div class="setting-icon-wrap">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Change Password</span>
          <span class="s-sub">Update your password</span>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow-icon"></ion-icon>
      </div>

      <div class="setting-row arrow-row">
        <div class="setting-icon-wrap">
          <ion-icon name="shield-outline"></ion-icon>
        </div>
        <div class="setting-text">
          <span class="s-title">Privacy Policy</span>
          <span class="s-sub">How we use your data</span>
        </div>
        <ion-icon name="chevron-forward-outline" class="arrow-icon"></ion-icon>
      </div>
    </div>

  </div>
</ion-content>
